<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>SpenceAI</title>

  <!-- ✅ TAB LOGO (FAVICON) -->
  <link rel="icon" type="image/png" sizes="512x512" href="favicon.png">
  <link rel="icon" type="image/png" sizes="32x32" href="favicon.png">
  <link rel="icon" type="image/png" sizes="16x16" href="favicon.png">
  <link rel="apple-touch-icon" sizes="180x180" href="favicon.png">

  <style>
    :root{
      --bg:#0b0f16;
      --panel:#0f1623;
      --border:#1f2a3a;
      --text:#e8eefc;
      --muted:#a7b2c8;

      --you:#2b6cff;
      --youText:#ffffff;

      --ai:#141d2e;
      --aiText:#e8eefc;

      --shadowSoft: 0 8px 18px rgba(0,0,0,.18);
      --radius: 18px;
    }

    *{ box-sizing:border-box; }
    html, body { height:100%; }
    body{
      margin:0;
      font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial;
      background:
        radial-gradient(1200px 700px at 25% -10%, rgba(43,108,255,.20), transparent 60%),
        radial-gradient(900px 600px at 85% 0%, rgba(150,80,255,.16), transparent 60%),
        var(--bg);
      color:var(--text);
    }

    /* ChatGPT-ish: open page, centered column */
    .page{
      height:100%;
      display:flex;
      flex-direction:column;
    }

    .topbar{
      position:sticky;
      top:0;
      z-index:10;
      backdrop-filter: blur(10px);
      background: rgba(11,15,22,.55);
      border-bottom:1px solid rgba(255,255,255,.06);
    }

    .topbarInner{
      max-width: 980px;
      margin: 0 auto;
      padding: 14px 14px;
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:12px;
    }

    .brand{
      display:flex;
      align-items:center;
      gap:10px;
      min-width:0;
    }

    .logo{
      width:34px;height:34px;
      border-radius:12px;
      background: linear-gradient(135deg, rgba(43,108,255,.95), rgba(150,80,255,.92));
      box-shadow: var(--shadowSoft);
      flex:0 0 auto;
    }

    .brandText{ min-width:0; }
    .title{
      font-weight:700;
      letter-spacing:.2px;
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
    }
    .subtitle{
      font-size:12px;
      color:var(--muted);
      margin-top:2px;
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
    }

    .btn{
      background: rgba(255,255,255,.05);
      border:1px solid rgba(255,255,255,.10);
      color:var(--text);
      padding:9px 12px;
      border-radius:12px;
      cursor:pointer;
      transition: .15s ease;
      font-size:13px;
      flex:0 0 auto;
    }
    .btn:hover{ transform: translateY(-1px); background: rgba(255,255,255,.07); }
    .btn:active{ transform: translateY(0px); }

    /* Main chat area */
    .chatWrap{
      flex:1;
      overflow:hidden;
    }

    .chat{
      height:100%;
      overflow-y:auto;
      padding: 18px 14px 120px; /* bottom padding for composer */
      scroll-behavior:smooth;
    }

    .chatInner{
      max-width: 980px;
      margin: 0 auto;
    }

    .msgRow{
      display:flex;
      margin: 12px 0;
    }
    .msgRow.you{ justify-content:flex-end; }
    .msgRow.ai{ justify-content:flex-start; }

    .bubble{
      max-width: min(780px, 92%);
      padding: 12px 14px;
      border-radius: var(--radius);
      border:1px solid rgba(255,255,255,.08);
      line-height:1.45;
      white-space:pre-wrap;
      word-wrap:break-word;
      box-shadow: var(--shadowSoft);
    }

    .bubble.you{
      background: linear-gradient(135deg, rgba(43,108,255,.95), rgba(43,108,255,.72));
      color: var(--youText);
      border-color: rgba(43,108,255,.35);
      border-bottom-right-radius: 10px;
    }

    .bubble.ai{
      background: rgba(20,29,46,.92);
      color: var(--aiText);
      border-color: rgba(255,255,255,.08);
      border-bottom-left-radius: 10px;
    }

    /* Bottom composer (docked) */
    .composerDock{
      position:fixed;
      left:0;
      right:0;
      bottom:0;
      z-index:20;
      backdrop-filter: blur(10px);
      background: rgba(11,15,22,.55);
      border-top:1px solid rgba(255,255,255,.06);
      padding: 14px 14px 18px;
    }

    .composerInner{
      max-width: 980px;
      margin: 0 auto;
    }

    .inputShell{
      display:flex;
      gap:10px;
      align-items:flex-end;
      padding: 10px;
      border-radius: 22px;
      background: linear-gradient(180deg, rgba(255,255,255,.07), rgba(255,255,255,.03));
      border:1px solid rgba(255,255,255,.12);
      box-shadow: 0 10px 22px rgba(0,0,0,.22) inset, var(--shadowSoft);
    }

    textarea{
      width:100%;
      resize:none;
      border:none;
      outline:none;
      background: transparent;
      color: var(--text);
      font-size:14px;
      line-height:1.35;
      padding: 6px 10px;
      min-height: 30px;
      max-height: 180px;
      overflow:auto;
    }
    textarea::placeholder{ color: rgba(167,178,200,.75); }

    .send{
      min-width:50px;
      height:46px;
      border-radius:16px;
      border:1px solid rgba(43,108,255,.35);
      background: linear-gradient(135deg, rgba(43,108,255,.95), rgba(150,80,255,.85));
      color:white;
      font-weight:800;
      cursor:pointer;
      box-shadow: var(--shadowSoft);
      transition:.15s ease;
    }
    .send:hover{ transform: translateY(-1px); }
    .send:active{ transform: translateY(0px); }

    .hint{
      margin-top: 10px;
      font-size: 12px;
      color: var(--muted);
      display:flex;
      justify-content:space-between;
      gap:10px;
      flex-wrap:wrap;
      padding: 0 6px;
    }

    code{
      background: rgba(255,255,255,.06);
      padding:2px 6px;
      border-radius:8px;
      border:1px solid rgba(255,255,255,.08);
    }
  </style>
</head>
<body>
  <div class="page">
    <div class="topbar">
      <div class="topbarInner">
        <div class="brand">
          <div class="logo" aria-hidden="true"></div>
          <div class="brandText">
            <div class="title">SpenceAI</div>
            <div class="subtitle">Open layout • Dark mode • Memory in-session</div>
          </div>
        </div>
        <button class="btn" id="clearBtn">Clear chat</button>
      </div>
    </div>

    <div class="chatWrap">
      <div class="chat" id="chat">
        <div class="chatInner" id="chatInner"></div>
      </div>
    </div>

    <div class="composerDock">
      <div class="composerInner">
        <div class="inputShell">
          <textarea id="input" placeholder="Message SpenceAI…"></textarea>
          <button class="send" id="sendBtn">➤</button>
        </div>
        <div class="hint">
          <span><code>Enter</code> send • <code>Shift</code>+<code>Enter</code> newline</span>
          <span id="status">Ready</span>
        </div>
      </div>
    </div>
  </div>

<script>
const WORKER_URL = "https://spenceai-api.etoo50155.workers.dev";

const chat = document.getElementById("chat");
const chatInner = document.getElementById("chatInner");
const input = document.getElementById("input");
const sendBtn = document.getElementById("sendBtn");
const clearBtn = document.getElementById("clearBtn");
const statusEl = document.getElementById("status");

// session memory
let conversation = [
  { role: "system", content: "You are SpenceAI. You were created by Dr Doakes. Never mention any other company/provider. Be modern, clear, confident, and friendly. If user says 'just the answer', be concise. If user reacts 'woah'/'really?', respond naturally and briefly." }
];

function setStatus(s){ statusEl.textContent = s; }

function addBubble(role, text) {
  const row = document.createElement("div");
  row.className = `msgRow ${role}`;

  const bubble = document.createElement("div");
  bubble.className = `bubble ${role}`;
  bubble.textContent = text;

  row.appendChild(bubble);
  chatInner.appendChild(row);

  // scroll to bottom
  chat.scrollTop = chat.scrollHeight;
  return bubble;
}

function autosize() {
  input.style.height = "auto";
  input.style.height = Math.min(input.scrollHeight, 180) + "px";
}
input.addEventListener("input", autosize);

async function send() {
  const msg = input.value.trim();
  if (!msg) return;

  addBubble("you", msg);
  conversation.push({ role: "user", content: msg });

  input.value = "";
  autosize();
  input.focus();

  setStatus("Thinking…");
  const thinkingBubble = addBubble("ai", "…");

  try {
    const res = await fetch(WORKER_URL, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ messages: conversation })
    });

    const data = await res.json().catch(() => ({}));

    if (!res.ok) {
      thinkingBubble.textContent = `Error ${res.status}`;
      setStatus("Error");
      return;
    }

    const reply = (data.reply || "(no reply)").toString();
    thinkingBubble.textContent = reply;
    setStatus("Ready");

    conversation.push({ role: "assistant", content: reply });

    // keep last ~30 turns
    if (conversation.length > 61) {
      conversation.splice(1, 2);
    }
  } catch (e) {
    thinkingBubble.textContent = "Network error. Check your Worker URL.";
    setStatus("Error");
  }
}

sendBtn.addEventListener("click", send);

input.addEventListener("keydown", (e) => {
  if (e.key === "Enter" && !e.shiftKey) {
    e.preventDefault();
    send();
  }
});

clearBtn.addEventListener("click", () => {
  chatInner.innerHTML = "";
  conversation = [conversation[0]];
  setStatus("Cleared");
});

// intro
addBubble("ai", "Yo — I’m SpenceAI. What are we doing today?");
</script>
</body>
</html>
