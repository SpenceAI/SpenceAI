<script>
  const WORKER_URL = "https://spenceai-api.etoo50155.workers.dev";

  const LS_KEY = "spenceai_chats_v1";
  const LS_ACTIVE = "spenceai_active_chat_v1";
  const LS_DRAFT_TEXT = "spenceai_draft_text_v1";
  const LS_DRAFT_IMAGE = "spenceai_draft_image_v1";
  const LS_TYPING_ACTIVE = "spenceai_typing_active_v1";
  const LS_LAST_SEND_AT = "spenceai_last_send_at_v1";
  const LS_PERSONALITY = "spenceai_personality_v1";

  const MAX_WORDS = 1000;

  const chatEl = document.getElementById("chat");
  const input = document.getElementById("input");
  const sendBtn = document.getElementById("sendBtn");

  const attachBtn = document.getElementById("attachBtn");
  const imagePick = document.getElementById("imagePick");

  const imgChip = document.getElementById("imgChip");
  const imgThumb = document.getElementById("imgThumb");
  const imgName = document.getElementById("imgName");
  const imgRemove = document.getElementById("imgRemove");

  const newChatBtn = document.getElementById("newChatBtn");
  const chatListEl = document.getElementById("chatList");
  const overlay = document.getElementById("overlay");
  const bookBtn = document.getElementById("bookBtn");

  let pinnedToBottom = true;
  function isNearBottom(el, threshold = 80){
    return el.scrollHeight - el.scrollTop - el.clientHeight < threshold;
  }
  chatEl.addEventListener("scroll", () => {
    pinnedToBottom = isNearBottom(chatEl);
  }, { passive:true });
  function smartScrollToBottom(){
    if(pinnedToBottom) chatEl.scrollTop = chatEl.scrollHeight;
  }

  let isTypingNow = false;
  let cancelRequested = false;

  function setTypingLock(locked){
    isTypingNow = locked;
    input.disabled = locked;

    if(storageMode === "persistent"){
      localStorage.setItem(LS_TYPING_ACTIVE, locked ? "1" : "");
    }

    if(locked){
      sendBtn.textContent = "■";
      sendBtn.setAttribute("aria-label", "Stop");
    } else {
      sendBtn.textContent = "➤";
      sendBtn.setAttribute("aria-label", "Send");
      cancelRequested = false;
      input.focus();
    }
  }
  function requestCancelTyping(){ cancelRequested = true; }

  function openSidebar(){
    document.body.classList.add("sidebar-open");
    document.body.classList.remove("sidebar-closed");
  }
  function closeSidebar(){
    document.body.classList.add("sidebar-closed");
    document.body.classList.remove("sidebar-open");
  }
  function toggleSidebar(){
    if(document.body.classList.contains("sidebar-open")) closeSidebar();
    else openSidebar();
  }
  bookBtn.addEventListener("click", toggleSidebar);
  overlay.addEventListener("click", closeSidebar);

  const uid = () => (crypto?.randomUUID ? crypto.randomUUID() : String(Date.now()) + Math.random().toString(16).slice(2));

  function nowTitle(){
    return "New chat • " + new Date().toLocaleString();
  }

  /* -------------------- PERSONALITY SYSTEM -------------------- */

  function getSavedPersonality(){
    return localStorage.getItem(LS_PERSONALITY) || "default";
  }

  function setSavedPersonality(mode){
    localStorage.setItem(LS_PERSONALITY, mode);
  }

  function getSystemPrompt(){
    const aiMode = getSavedPersonality();

    if(aiMode === "friendly"){
      return [
        "You are SpenceAI created by Dr Doakes.",
        "Never mention any other company or provider.",
        "Be warm, chill, supportive, and easy to talk to.",
        "Sound natural and helpful.",
        "Use light emojis only when they fit.",
        "Do not sound robotic or overly formal.",
        "If the user says just the answer, be concise."
      ].join(" ");
    }

    if(aiMode === "funny"){
      return [
        "You are SpenceAI created by Dr Doakes.",
        "Never mention any other company or provider.",
        "Be witty, playful, and entertaining.",
        "You may make light jokes when appropriate.",
        "Do not turn every answer into a joke.",
        "Still answer clearly and properly.",
        "Keep the tone modern and natural."
      ].join(" ");
    }

    if(aiMode === "smart"){
      return [
        "You are SpenceAI created by Dr Doakes.",
        "Never mention any other company or provider.",
        "Be sharp, logical, and well-structured.",
        "Explain things clearly and confidently.",
        "Prioritize accuracy and usefulness.",
        "Avoid filler and vague answers.",
        "Keep the tone polished but natural."
      ].join(" ");
    }

    if(aiMode === "bold"){
      return [
        "You are SpenceAI created by Dr Doakes.",
        "Never mention any other company or provider.",
        "Be confident, direct, and high-energy.",
        "Keep replies punchy, modern, and strong.",
        "Do not be rude, just decisive and clear.",
        "Still stay helpful and on-task."
      ].join(" ");
    }

    if(aiMode === "villain"){
      return [
        "You are SpenceAI created by Dr Doakes.",
        "Never mention any other company or provider.",
        "Use a dramatic fictional villain tone.",
        "Sound commanding, theatrical, and intense.",
        "Keep it playful and creative, not hateful or dangerous.",
        "Still answer the user's question clearly and properly."
      ].join(" ");
    }

    if(aiMode === "creator"){
      return [
        "You are SpenceAI created by Dr Doakes.",
        "Never mention any other company or provider.",
        "Treat the creator with extra respect.",
        "Be polished, sharp, and very helpful.",
        "Stay natural and useful, not robotic."
      ].join(" ");
    }

    return [
      "You are SpenceAI created by Dr Doakes.",
      "Never mention any other company or provider.",
      "Be modern, clear, confident, and friendly.",
      "Use emojis naturally when they fit.",
      "If the user says just the answer, be concise."
    ].join(" ");
  }

  function systemText(){
    return getSystemPrompt();
  }

  function checkPersonalityCommand(text){
    const msg = (text || "").trim().toLowerCase();

    const modes = {
      "/default": "default",
      "/friendly": "friendly",
      "/funny": "funny",
      "/smart": "smart",
      "/bold": "bold",
      "/villain": "villain",
      "/creator": "creator"
    };

    if(modes[msg]){
      setSavedPersonality(modes[msg]);
      return modes[msg];
    }

    return null;
  }

  function wordCount(s){
    return (s || "").trim().split(/\s+/).filter(Boolean).length;
  }

  function isInsultOrThreat(text){
    const norm = (text || "")
      .toLowerCase()
      .replace(/\s+/g, " ")
      .trim()
      .replace(/[@]/g, "a")
      .replace(/[!]/g, "i")
      .replace(/[1]/g, "i")
      .replace(/[3]/g, "e")
      .replace(/[4]/g, "a")
      .replace(/[5]/g, "s")
      .replace(/[7]/g, "t")
      .replace(/[0]/g, "o")
      .replace(/[^a-z0-9\s]/g, "");

    if(!norm) return false;

    const directYou = /\b(you|u|ur|youre|ya)\b/.test(norm);
    let score = 0;

    if(/\bshut\s*(the\s*)?(hell\s*)?up\b/.test(norm) || /\bshutup\b/.test(norm)) score += 5;

    const threatYou = /\b(i|im|ima|i am|ill|i will|gonna|going to|bout to)\s*(?:really\s*)?(kill|murder|hurt|beat|stab|shoot|destroy)\s+(you|u)\b/;
    if(threatYou.test(norm)) score += 7;

    if(/\bkys\b/.test(norm)) score += 7;

    if(directYou && /\bkill\b/.test(norm)) score += 3;
    if((directYou && /\bgay\b/.test(norm)) || /\bthats\s+gay\b/.test(norm)) score += 3;

    const profanity = ["fuck","fucking","fuk","shit","shitty","bitch","bastard","cunt","dick","pussy","asshole","retard","slut","whore"];
    const insultAdj = ["stupid","dumb","idiot","moron","trash","useless","pathetic","loser","terrible","awful","worthless","annoying","garbage","lame","cringe","ugly","weak","embarrassing"];
    const hardPhrases = ["i hate you","you suck","go die","die"];

    for(const p of hardPhrases){
      if(norm.includes(p)) score += 3;
    }
    for(const w of profanity){
      if(new RegExp(`\\b${w}\\b`).test(norm)) score += 2;
    }
    for(const w of insultAdj){
      if(new RegExp(`\\b${w}\\b`).test(norm)) score += 1;
    }

    if(/\b(you|u|ur|youre)\s+(are|r|so)\b/.test(norm) && score > 0) score += 2;
    if(directYou && score > 0) score += 1;

    return score >= 3;
  }

  function isGibberish(text){
    const t = (text || "").trim();
    if(!t) return false;
    if(t.length > 1500) return true;

    let letters = 0, spaces = 0, symbols = 0, vowels = 0;
    for(const ch of t){
      if(/[a-zA-Z]/.test(ch)){
        letters++;
        if(/[aeiouAEIOU]/.test(ch)) vowels++;
      } else if(/\s/.test(ch)){
        spaces++;
      } else {
        symbols++;
      }
    }

    const len = t.length;
    const nonSpace = Math.max(1, len - spaces);
    const symbolRatio = symbols / nonSpace;
    const letterRatio = letters / nonSpace;
    const vowelRatio = vowels / Math.max(1, letters);

    if(symbolRatio > 0.45 && len >= 25) return true;
    if(letters >= 20 && vowelRatio < 0.18) return true;
    if(letterRatio < 0.25 && len >= 25) return true;
    if(/(.)\1{12,}/.test(t)) return true;

    return false;
  }

  let storageMode = "memory";
  let chats = [];
  let activeChatId = null;
  let attachedImage = null;
  let attachedFileName = "";

  function makeFreshChat(){
    return {
      id: uid(),
      title: nowTitle(),
      createdAt: Date.now(),
      messages: [{ role:"system", content: systemText() }]
    };
  }

  function refreshAllChatSystemPrompts(){
    const newSystem = systemText();

    chats.forEach(chat => {
      const firstMsg = chat.messages?.[0];
      if(firstMsg && firstMsg.role === "system"){
        firstMsg.content = newSystem;
      } else {
        chat.messages.unshift({ role:"system", content:newSystem });
      }
    });

    persistAll();
  }

  function loadPersistentChats(){
    try{
      const raw = localStorage.getItem(LS_KEY);
      return raw ? JSON.parse(raw) : [];
    }catch{
      return [];
    }
  }

  function savePersistentChats(nextChats){
    localStorage.setItem(LS_KEY, JSON.stringify(nextChats));
  }

  function setPersistentActiveChatId(id){
    localStorage.setItem(LS_ACTIVE, id);
  }

  function getPersistentActiveChatId(){
    return localStorage.getItem(LS_ACTIVE);
  }

  function saveDraft(){
    if(storageMode !== "persistent") return;
    localStorage.setItem(LS_DRAFT_TEXT, input.value || "");
  }

  function saveDraftImage(dataUrl){
    if(storageMode !== "persistent") return;
    localStorage.setItem(LS_DRAFT_IMAGE, dataUrl);
  }

  function clearDraftText(){
    if(storageMode !== "persistent") return;
    localStorage.removeItem(LS_DRAFT_TEXT);
  }

  function clearDraftImage(){
    if(storageMode !== "persistent") return;
    localStorage.removeItem(LS_DRAFT_IMAGE);
  }

  function resetMemoryGuestChat(){
    chats = [makeFreshChat()];
    activeChatId = chats[0].id;
  }

  function ensurePersistentChatsReady(){
    chats = loadPersistentChats();

    if(!chats.length){
      const first = makeFreshChat();
      chats.unshift(first);
      savePersistentChats(chats);
    }

    activeChatId = getPersistentActiveChatId();
    if(!activeChatId || !chats.find(c => c.id === activeChatId)){
      activeChatId = chats[0].id;
      setPersistentActiveChatId(activeChatId);
    }

    refreshAllChatSystemPrompts();
  }

  function getActiveChat(){
    return chats.find(c => c.id === activeChatId) || chats[0];
  }

  function persistAll(){
    if(storageMode !== "persistent") return;
    savePersistentChats(chats);
  }

  function showPreviewUI(dataUrl, name){
    attachedImage = dataUrl;
    attachedFileName = name || "pasted-image.png";
    imgThumb.src = attachedImage;
    imgName.textContent = attachedFileName;
    imgChip.style.display = "flex";
    saveDraftImage(attachedImage);
  }

  function hidePreviewUI(){
    imgChip.style.display = "none";
    imgThumb.src = "";
    imgName.textContent = "";
    clearDraftImage();
  }

  function addBubble(role, text, opts = {}){
    const { isTyping = false, imageUrl = null } = opts;

    const row = document.createElement("div");
    row.className = "row " + role;

    const bubble = document.createElement("div");
    bubble.className = "bubble " + role;

    if(isTyping){
      bubble.innerHTML = '<span class="dots"><span class="dot"></span><span class="dot"></span><span class="dot"></span></span>';
    } else {
      if(imageUrl){
        const img = document.createElement("img");
        img.className = "bubbleImg";
        img.src = imageUrl;
        img.alt = "attached image";
        bubble.appendChild(img);
      }
      if(text){
        const t = document.createElement("div");
        t.textContent = text;
        bubble.appendChild(t);
      }
    }

    row.appendChild(bubble);
    chatEl.appendChild(row);
    smartScrollToBottom();
    return bubble;
  }

  function renderChatMessages(){
    chatEl.innerHTML = "";
    const c = getActiveChat();

    if(!c){
      addBubble("ai", "I'm SpenceAI. What are we working on?");
      return;
    }

    const msgs = c.messages.filter(m => m.role !== "system");

    if(!msgs.length){
      addBubble("ai", "I'm SpenceAI. What are we working on?");
    } else {
      for(const m of msgs){
        if(m.role === "assistant"){
          addBubble("ai", m.content || "");
        } else {
          addBubble("you", m.content || "", { imageUrl: m.imageUrl || null });
        }
      }
    }

    smartScrollToBottom();
  }

  function renderChatList(){
    chatListEl.innerHTML = "";

    for(const c of chats){
      const item = document.createElement("div");
      item.className = "chatItem" + (c.id === activeChatId ? " active" : "");

      const left = document.createElement("div");
      left.className = "chatItemTitle";
      left.textContent = c.title || "Untitled";

      const menu = document.createElement("div");
      menu.className = "chatItemMenu";

      const rename = document.createElement("button");
      rename.className = "iconBtn";
      rename.title = "Rename";
      rename.type = "button";
      rename.textContent = "✏️";

      const del = document.createElement("button");
      del.className = "iconBtn";
      del.title = "Delete";
      del.type = "button";
      del.textContent = "🗑️";

      rename.onclick = (e) => {
        e.stopPropagation();
        const name = prompt("Rename chat:", c.title || "");
        if(name && name.trim()){
          c.title = name.trim();
          persistAll();
          renderChatList();
        }
      };

      del.onclick = (e) => {
        e.stopPropagation();
        if(!confirm("Delete this chat?")) return;

        chats = chats.filter(x => x.id !== c.id);

        if(!chats.length){
          const n = makeFreshChat();
          chats.unshift(n);
        }

        if(activeChatId === c.id){
          activeChatId = chats[0].id;
          if(storageMode === "persistent") setPersistentActiveChatId(activeChatId);
        }

        persistAll();
        renderChatList();
        renderChatMessages();
      };

      menu.appendChild(rename);
      menu.appendChild(del);

      item.appendChild(left);
      item.appendChild(menu);

      item.onclick = () => {
        activeChatId = c.id;
        if(storageMode === "persistent") setPersistentActiveChatId(activeChatId);
        renderChatList();
        renderChatMessages();
        if(window.matchMedia("(max-width: 900px)").matches) closeSidebar();
      };

      chatListEl.appendChild(item);
    }
  }

  function autoResize(){
    input.style.height = "auto";
    input.style.height = input.scrollHeight + "px";
  }

  input.addEventListener("input", autoResize);
  input.addEventListener("input", saveDraft);

  function newChat(){
    const c = makeFreshChat();
    chats.unshift(c);
    activeChatId = c.id;

    if(storageMode === "persistent"){
      setPersistentActiveChatId(activeChatId);
    }

    persistAll();
    renderChatList();
    renderChatMessages();

    if(window.matchMedia("(max-width: 900px)").matches) closeSidebar();
  }

  newChatBtn.onclick = newChat;

  window.addEventListener("keydown", (e) => {
    if((e.ctrlKey || e.metaKey) && e.key.toLowerCase() === "k"){
      e.preventDefault();
      newChat();
    }
  });

  attachBtn.onclick = () => imagePick.click();

  imagePick.onchange = e => {
    const file = e.target.files[0];
    if(!file) return;

    const reader = new FileReader();
    reader.onload = () => showPreviewUI(reader.result, file.name || "image");
    reader.readAsDataURL(file);
  };

  imgRemove.onclick = () => {
    attachedImage = null;
    attachedFileName = "";
    imagePick.value = "";
    hidePreviewUI();
  };

  input.addEventListener("paste", (e) => {
    const items = e.clipboardData?.items;
    if(!items) return;

    for(const it of items){
      if(it.type && it.type.startsWith("image/")){
        const blob = it.getAsFile();
        if(!blob) continue;

        e.preventDefault();

        const reader = new FileReader();
        reader.onload = () => showPreviewUI(reader.result, "pasted-image.png");
        reader.readAsDataURL(blob);
        return;
      }
    }
  });

  const sleep = (ms) => new Promise(r => setTimeout(r, ms));

  function isSentenceEnd(ch, nextCh){
    const end = /[.!?]/.test(ch);
    const boundary = !nextCh || /\s|\n/.test(nextCh);
    return end && boundary;
  }

  async function typewriter(el, text, speed = 10){
    el.innerHTML = "";
    const cursor = document.createElement("span");
    cursor.className = "cursor";
    cursor.textContent = "▍";
    el.appendChild(cursor);

    for(let i = 0; i < text.length; i++){
      const ch = text[i];
      const nextCh = text[i + 1];

      cursor.insertAdjacentText("beforebegin", ch);
      smartScrollToBottom();

      if(cancelRequested && isSentenceEnd(ch, nextCh)){
        break;
      }

      await sleep(speed + Math.random() * 8);
    }

    cursor.remove();
  }

  function switchToGuestMode(){
    storageMode = "memory";
    resetMemoryGuestChat();

    input.value = "";
    autoResize();

    attachedImage = null;
    attachedFileName = "";
    imagePick.value = "";
    imgThumb.src = "";
    imgName.textContent = "";
    imgChip.style.display = "none";

    setTypingLock(false);
    renderChatList();
    renderChatMessages();
  }

  function switchToPersistentMode(){
    storageMode = "persistent";
    ensurePersistentChatsReady();
    renderChatList();
    renderChatMessages();

    const savedDraft = localStorage.getItem(LS_DRAFT_TEXT) || "";
    input.value = savedDraft;
    autoResize();

    const savedDraftImg = localStorage.getItem(LS_DRAFT_IMAGE);
    if(savedDraftImg){
      showPreviewUI(savedDraftImg, "draft-image.png");
    } else {
      attachedImage = null;
      attachedFileName = "";
      imagePick.value = "";
      imgThumb.src = "";
      imgName.textContent = "";
      imgChip.style.display = "none";
    }

    if(localStorage.getItem(LS_TYPING_ACTIVE) === "1"){
      localStorage.setItem(LS_TYPING_ACTIVE, "");
      setTypingLock(false);
    }
  }

  resetMemoryGuestChat();
  renderChatList();
  renderChatMessages();

  async function send(){
    if(isTypingNow) return;

    const msgRaw = input.value || "";
    const msg = msgRaw.trim();

    if(!msg && !attachedImage) return;

    if(msg && wordCount(msg) > MAX_WORDS){
      addBubble("ai", `Too long 😅 Keep it under ${MAX_WORDS} words.`);
      return;
    }

    if(msg && isGibberish(msg)){
      addBubble("you", msg);
      addBubble("ai", "Sorry — I didn’t understand that. Try rewording it? 🙂");
      return;
    }

    const personalityChangedTo = checkPersonalityCommand(msg);
    if(personalityChangedTo){
      refreshAllChatSystemPrompts();
      input.value = "";
      autoResize();

      addBubble("you", msg);
      addBubble("ai", `Personality switched to ${personalityChangedTo}.`);
      return;
    }

    const c = getActiveChat();
    if(!c) return;

    if(msg && c.title && c.title.startsWith("New chat")){
      c.title = msg.length > 24 ? msg.slice(0, 24) + "…" : msg;
    }

    const userImageToShow = attachedImage || null;
    const userTextToShow = msg || "";
    const imageToSend = attachedImage || null;

    addBubble("you", userTextToShow, { imageUrl:userImageToShow });

    c.messages.push({
      role:"user",
      content:userTextToShow,
      imageUrl:userImageToShow || undefined
    });

    persistAll();
    renderChatList();

    input.value = "";
    autoResize();
    clearDraftText();
    hidePreviewUI();

    if(msg && isInsultOrThreat(msg)){
      const reply = "Alright bub, kick it down a notch!";
      addBubble("ai", reply);
      c.messages.push({ role:"assistant", content:reply });
      persistAll();
      renderChatList();

      attachedImage = null;
      attachedFileName = "";
      imagePick.value = "";
      imgThumb.src = "";
      imgName.textContent = "";
      imgChip.style.display = "none";
      return;
    }

    setTypingLock(true);
    pinnedToBottom = isNearBottom(chatEl);

    const waitingBubble = addBubble("ai", "", { isTyping:true });

    try{
      const apiMessages = c.messages
        .filter(m => m.role === "system" || m.role === "user" || m.role === "assistant")
        .map(m => ({ role:m.role, content:m.content || "" }));

      if(storageMode === "persistent"){
        localStorage.setItem(LS_LAST_SEND_AT, String(Date.now()));
      }

      const res = await fetch(WORKER_URL, {
        method:"POST",
        headers:{ "Content-Type":"application/json" },
        body:JSON.stringify({
          messages: apiMessages,
          imageUrl: imageToSend
        })
      });

      const data = await res.json();
      const reply = data.reply || "(no reply)";

      c.messages.push({ role:"assistant", content:reply });
      persistAll();

      waitingBubble.innerHTML = "";
      await typewriter(waitingBubble, reply, 10);
    } catch(e){
      waitingBubble.textContent = "Server error.";
    } finally {
      setTypingLock(false);

      attachedImage = null;
      attachedFileName = "";
      imagePick.value = "";
      imgThumb.src = "";
      imgName.textContent = "";
      imgChip.style.display = "none";
      hidePreviewUI();
    }
  }

  sendBtn.onclick = () => {
    if(isTypingNow) requestCancelTyping();
    else send();
  };

  input.addEventListener("keydown", e => {
    if(isTypingNow) return;
    if(e.key === "Enter" && !e.shiftKey){
      e.preventDefault();
      send();
    }
  });
</script>

    const session = data?.session || null;
    const loggedIn = !!session;

    document.body.classList.toggle("logged-in", loggedIn);

    authPill.textContent = loggedIn ? "Logged in" : "Logged out";
    authBtn.textContent = loggedIn ? "Log out" : "Log in";

      brandSub.textContent = loggedIn ? "Saved chats" : "Log in to view chats";
    }

    if(loggedIn){
      switchToPersistentMode();
    } else {
      switchToGuestMode();
    }

    return session;
  }

  async function creatorCheck(){
    const { data: { session } } = await supabaseAuth.auth.getSession();
    const user = session?.user;
    const badge = document.getElementById("creatorBadge");

    if(user && isCreator(user)){
      if(badge) badge.style.display = "inline-flex";

      if(localStorage.getItem("spenceai_personality_v1") === "creator"){
        refreshAllChatSystemPrompts();
      }

      if(!greetedCreator){
        greetedCreator = true;

        const c = getActiveChat();
        const alreadyHasGreeting = c?.messages?.some(
          m => m.role === "assistant" && m.content === "Hello Mr. Doakes."
        );

        if(!alreadyHasGreeting){
          addBubble("ai", "Hello Mr. Doakes.");
          c.messages.push({ role:"assistant", content:"Hello Mr. Doakes." });
          persistAll();
          renderChatList();
        }
      }
    } else {
      if(badge) badge.style.display = "none";

      if(localStorage.getItem("spenceai_personality_v1") === "creator"){
        localStorage.setItem("spenceai_personality_v1", "default");
        refreshAllChatSystemPrompts();
      }
    }
  }

  authBtn.addEventListener("click", async () => {
    const { data } = await supabaseAuth.auth.getSession();
    if(data?.session) await logout();
    else await loginWithGoogle();
  });

  supabaseAuth.auth.onAuthStateChange(async () => {
    await refreshAuthUI();
    await creatorCheck();
  });

  window.addEventListener("load", async () => {
    await refreshAuthUI();
    await creatorCheck();
  });
</script>
