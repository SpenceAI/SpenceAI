<script>
  const WORKER_URL = "https://spenceai-api.etoo50155.workers.dev";

  /* Storage */
  const LS_KEY = "spenceai_chats_v1";
  const LS_ACTIVE = "spenceai_active_chat_v1";

  // NEW: draft + in-progress typing persistence
  const LS_DRAFT = "spenceai_draft_v1";
  const LS_PENDING = "spenceai_pending_v1";

  /* DOM */
  const chatEl = document.getElementById("chat");
  const input = document.getElementById("input");
  const sendBtn = document.getElementById("sendBtn");

  const attachBtn = document.getElementById("attachBtn");
  const imagePick = document.getElementById("imagePick");

  const imgChip = document.getElementById("imgChip");
  const imgThumb = document.getElementById("imgThumb");
  const imgName = document.getElementById("imgName");
  const imgRemove = document.getElementById("imgRemove");

  const newChatBtn = document.getElementById("newChatBtn");
  const chatListEl = document.getElementById("chatList");
  const overlay = document.getElementById("overlay");
  const bookBtn = document.getElementById("bookBtn");

  const authBtn = document.getElementById("authBtn");
  const authPill = document.getElementById("authPill");
  const brandSub = document.getElementById("brandSub");

  /* Smart scroll */
  let pinnedToBottom = true;
  function isNearBottom(el, threshold = 80){
    return el.scrollHeight - el.scrollTop - el.clientHeight < threshold;
  }
  chatEl.addEventListener("scroll", () => {
    pinnedToBottom = isNearBottom(chatEl);
  }, { passive: true });
  function smartScrollToBottom(){
    if(pinnedToBottom) chatEl.scrollTop = chatEl.scrollHeight;
  }

  /* Typing lock + Stop button */
  let isTypingNow = false;
  let cancelRequested = false;

  function setTypingLock(locked){
    isTypingNow = locked;
    input.disabled = locked;

    if(locked){
      sendBtn.textContent = "■";
      sendBtn.setAttribute("aria-label", "Stop");
    } else {
      sendBtn.textContent = "➤";
      sendBtn.setAttribute("aria-label", "Send");
      cancelRequested = false;
      input.focus();
    }
  }
  function requestCancelTyping(){ cancelRequested = true; }

  /* Sidebar controls */
  function openSidebar(){
    document.body.classList.add("sidebar-open");
    document.body.classList.remove("sidebar-closed");
  }
  function closeSidebar(){
    document.body.classList.add("sidebar-closed");
    document.body.classList.remove("sidebar-open");
  }
  function toggleSidebar(){
    if(document.body.classList.contains("sidebar-open")) closeSidebar();
    else openSidebar();
  }
  bookBtn.addEventListener("click", toggleSidebar);
  overlay.addEventListener("click", closeSidebar);

  /* Helpers */
  const uid = () => (crypto?.randomUUID ? crypto.randomUUID() : String(Date.now()) + Math.random().toString(16).slice(2));
  function nowTitle(){ return "New chat • " + new Date().toLocaleString(); }

  function loadAllChats(){
    try{
      const raw = localStorage.getItem(LS_KEY);
      return raw ? JSON.parse(raw) : [];
    }catch{ return []; }
  }
  function saveAllChats(chats){ localStorage.setItem(LS_KEY, JSON.stringify(chats)); }
  function setActiveChatId(id){ localStorage.setItem(LS_ACTIVE, id); }
  function getActiveChatId(){ return localStorage.getItem(LS_ACTIVE); }

  function systemText(){
    return "You are SpenceAI. You were created by Dr Doakes. Never mention any other company/provider. Be modern, clear, confident, and friendly. Use emojis naturally when it fits 😊✨. If user says 'just the answer', be concise.";
  }

  /* Insult/threat detection -> reply always 'Why Julian' */
  function isInsultOrThreat(text){
    const norm = (text || "")
      .toLowerCase()
      .replace(/\s+/g, " ")
      .trim()
      .replace(/[@]/g, "a")
      .replace(/[!]/g, "i")
      .replace(/[1]/g, "i")
      .replace(/[3]/g, "e")
      .replace(/[4]/g, "a")
      .replace(/[5]/g, "s")
      .replace(/[7]/g, "t")
      .replace(/[0]/g, "o")
      .replace(/[^a-z0-9\s]/g, "");

    if(!norm) return false;

    const directYou = /\b(you|u|ur|youre|ya)\b/.test(norm);
    let score = 0;

    if(/\bshut\s*(the\s*)?(hell\s*)?up\b/.test(norm) || /\bshutup\b/.test(norm)) score += 5;

    const threatYou = /\b(i|im|ima|i am|ill|i will|gonna|going to|bout to)\s*(?:really\s*)?(kill|murder|hurt|beat|stab|shoot|destroy)\s+(you|u)\b/;
    if(threatYou.test(norm)) score += 7;

    if(/\bkys\b/.test(norm)) score += 7;

    if(directYou && /\bkill\b/.test(norm)) score += 3;
    if((directYou && /\bgay\b/.test(norm)) || /\bthats\s+gay\b/.test(norm)) score += 3;

    const profanity = ["fuck","fucking","fuk","shit","shitty","bitch","bastard","cunt","dick","pussy","asshole","retard","slut","whore"];
    const insultAdj = ["stupid","dumb","idiot","moron","trash","useless","pathetic","loser","terrible","awful","worthless","annoying","garbage","lame","cringe","ugly","weak","embarrassing"];
    const hardPhrases = ["i hate you","you suck","go die","die"];

    for(const p of hardPhrases){
      if(norm.includes(p)) score += 3;
    }
    for(const w of profanity){
      if(new RegExp(`\\b${w}\\b`).test(norm)) score += 2;
    }
    for(const w of insultAdj){
      if(new RegExp(`\\b${w}\\b`).test(norm)) score += 1;
    }

    if(/\b(you|u|ur|youre)\s+(are|r|so)\b/.test(norm) && score > 0) score += 2;
    if(directYou && score > 0) score += 1;

    return score >= 3;
  }

  /* Gibberish / symbol spam limit */
  function isGibberish(text){
    const t = (text || "").trim();
    if(!t) return false;

    if(t.length > 1500) return true;

    let letters = 0, spaces = 0, symbols = 0, vowels = 0;
    for(const ch of t){
      if(/[a-zA-Z]/.test(ch)){ letters++; if(/[aeiouAEIOU]/.test(ch)) vowels++; }
      else if(/\s/.test(ch)) spaces++;
      else symbols++;
    }
    const len = t.length;
    const nonSpace = Math.max(1, len - spaces);

    const symbolRatio = symbols / nonSpace;
    const letterRatio = letters / nonSpace;
    const vowelRatio = vowels / Math.max(1, letters);

    if(symbolRatio > 0.45 && len >= 25) return true;
    if(letters >= 20 && vowelRatio < 0.18) return true;
    if(letterRatio < 0.25 && len >= 25) return true;
    if(/(.)\1{12,}/.test(t)) return true;

    return false;
  }

  /* Chats */
  let chats = loadAllChats();
  let activeChatId = getActiveChatId();

  if(!chats.length){
    const first = {
      id: uid(),
      title: nowTitle(),
      createdAt: Date.now(),
      messages: [{ role:"system", content: systemText() }]
    };
    chats.unshift(first);
    saveAllChats(chats);
    activeChatId = first.id;
    setActiveChatId(activeChatId);
  }

  if(!activeChatId || !chats.find(c=>c.id===activeChatId)){
    activeChatId = chats[0].id;
    setActiveChatId(activeChatId);
  }

  function getActiveChat(){ return chats.find(c=>c.id===activeChatId); }
  function persistAll(){ saveAllChats(chats); }

  /* UI: supports image bubble */
  function addBubble(role, text, opts={}){
    const { isTyping=false, imageUrl=null } = opts;

    const row = document.createElement("div");
    row.className = "row " + role;

    const bubble = document.createElement("div");
    bubble.className = "bubble " + role;

    if(isTyping){
      bubble.innerHTML = '<span class="dots"><span class="dot"></span><span class="dot"></span><span class="dot"></span></span>';
    } else {
      if(imageUrl){
        const img = document.createElement("img");
        img.className = "bubbleImg";
        img.src = imageUrl;
        img.alt = "attached image";
        bubble.appendChild(img);
      }
      if(text){
        const t = document.createElement("div");
        t.textContent = text;
        bubble.appendChild(t);
      }
    }

    row.appendChild(bubble);
    chatEl.appendChild(row);
    smartScrollToBottom();
    return bubble;
  }

  function renderChatMessages(){
    chatEl.innerHTML = "";
    const c = getActiveChat();
    const msgs = c.messages.filter(m=>m.role!=="system");

    if(!msgs.length){
      addBubble("ai","I'm SpenceAI. What are we working on?");
    } else {
      for(const m of msgs){
        if(m.role === "assistant"){
          addBubble("ai", m.content || "");
        } else {
          addBubble("you", m.content || "", { imageUrl: m.imageUrl || null });
        }
      }
    }
    smartScrollToBottom();
  }

  function renderChatList(){
    chatListEl.innerHTML = "";
    for(const c of chats){
      const item = document.createElement("div");
      item.className = "chatItem" + (c.id === activeChatId ? " active" : "");

      const left = document.createElement("div");
      left.className = "chatItemTitle";
      left.textContent = c.title || "Untitled";

      const menu = document.createElement("div");
      menu.className = "chatItemMenu";

      const rename = document.createElement("button");
      rename.className = "iconBtn";
      rename.title = "Rename";
      rename.type = "button";
      rename.textContent = "✏️";

      const del = document.createElement("button");
      del.className = "iconBtn";
      del.title = "Delete";
      del.type = "button";
      del.textContent = "🗑️";

      rename.onclick = (e)=>{
        e.stopPropagation();
        const name = prompt("Rename chat:", c.title || "");
        if(name && name.trim()){
          c.title = name.trim();
          saveAllChats(chats);
          renderChatList();
        }
      };

      del.onclick = (e)=>{
        e.stopPropagation();
        if(!confirm("Delete this chat?")) return;
        chats = chats.filter(x=>x.id!==c.id);

        if(!chats.length){
          const n = { id: uid(), title: nowTitle(), createdAt: Date.now(), messages:[{role:"system", content: systemText()}] };
          chats.unshift(n);
        }
        if(activeChatId === c.id){
          activeChatId = chats[0].id;
          setActiveChatId(activeChatId);
        }
        saveAllChats(chats);
        renderChatList();
        renderChatMessages();
      };

      menu.appendChild(rename);
      menu.appendChild(del);

      item.appendChild(left);
      item.appendChild(menu);

      item.onclick = ()=>{
        activeChatId = c.id;
        setActiveChatId(activeChatId);
        renderChatList();
        renderChatMessages();
        if(window.matchMedia("(max-width: 900px)").matches) closeSidebar();
      };

      chatListEl.appendChild(item);
    }
  }

  /* Input UX */
  function autoResize(){
    input.style.height = "auto";
    input.style.height = input.scrollHeight + "px";
  }
  input.addEventListener("input", ()=>{
    autoResize();
    saveDraft();
  });

  /* NEW: Draft save/restore (prompt + image) */
  function saveDraft(){
    try{
      localStorage.setItem(LS_DRAFT, JSON.stringify({
        chatId: activeChatId,
        text: input.value || "",
        image: attachedImage || null,
        imageName: attachedFileName || ""
      }));
    }catch{}
  }
  function loadDraft(){
    try{
      const raw = localStorage.getItem(LS_DRAFT);
      if(!raw) return null;
      const d = JSON.parse(raw);
      if(!d || d.chatId !== activeChatId) return null;
      return d;
    }catch{ return null; }
  }
  function clearDraft(){
    try{ localStorage.removeItem(LS_DRAFT); }catch{}
  }

  /* New chat */
  function newChat(){
    const c = {
      id: uid(),
      title: nowTitle(),
      createdAt: Date.now(),
      messages: [{ role:"system", content: systemText() }]
    };
    chats.unshift(c);
    activeChatId = c.id;
    setActiveChatId(activeChatId);
    persistAll();
    renderChatList();
    renderChatMessages();
    if(window.matchMedia("(max-width: 900px)").matches) closeSidebar();
    // new chat = new draft context
    clearDraft();
    attachedImage = null;
    attachedFileName = "";
    hidePreviewUI();
  }
  newChatBtn.onclick = newChat;

  window.addEventListener("keydown", (e)=>{
    if((e.ctrlKey || e.metaKey) && e.key.toLowerCase() === "k"){
      e.preventDefault();
      newChat();
    }
  });

  /* Image attach state */
  let attachedImage = null;
  let attachedFileName = "";

  function hidePreviewUI(){
    imgChip.style.display = "none";
    imgThumb.src = "";
    imgName.textContent = "";
  }
  function showPreviewUI(dataUrl, name){
    imgThumb.src = dataUrl;
    imgName.textContent = name || "pasted image";
    imgChip.style.display = "flex";
  }

  /* OPTIONAL button still works */
  attachBtn.onclick = () => imagePick.click();
  imagePick.onchange = e => {
    const file = e.target.files[0];
    if(!file) return;

    const reader = new FileReader();
    reader.onload = () => {
      attachedImage = reader.result;
      attachedFileName = file.name || "image";
      showPreviewUI(attachedImage, attachedFileName);
      saveDraft();
    };
    reader.readAsDataURL(file);
  };

  imgRemove.onclick = () => {
    attachedImage = null;
    attachedFileName = "";
    imagePick.value = "";
    hidePreviewUI();
    saveDraft();
  };

  /* ✅ NEW: Paste image (Ctrl+V) into the textbox */
  input.addEventListener("paste", (e)=>{
    try{
      const items = e.clipboardData?.items;
      if(!items) return;

      for(const it of items){
        if(it.kind === "file" && it.type.startsWith("image/")){
          const file = it.getAsFile();
          if(!file) continue;

          const reader = new FileReader();
          reader.onload = () => {
            attachedImage = reader.result;
            attachedFileName = file.name || "pasted-image.png";
            showPreviewUI(attachedImage, attachedFileName);
            saveDraft();
          };
          reader.readAsDataURL(file);

          // prevent random pasted text when image is pasted
          e.preventDefault();
          return;
        }
      }
    }catch{}
  });

  /* Linear typing */
  const sleep = (ms) => new Promise(r => setTimeout(r, ms));
  function isSentenceEnd(ch, nextCh){
    const end = /[.!?]/.test(ch);
    const boundary = !nextCh || /\s|\n/.test(nextCh);
    return end && boundary;
  }

  // NEW: persist partial assistant text so refresh doesn't wipe it
  function setPending(partialText){
    try{
      localStorage.setItem(LS_PENDING, JSON.stringify({
        chatId: activeChatId,
        partial: partialText || ""
      }));
    }catch{}
  }
  function clearPending(){
    try{ localStorage.removeItem(LS_PENDING); }catch{}
  }
  function loadPending(){
    try{
      const raw = localStorage.getItem(LS_PENDING);
      if(!raw) return null;
      const p = JSON.parse(raw);
      if(!p || p.chatId !== activeChatId) return null;
      return p;
    }catch{ return null; }
  }

  async function typewriter(el, text, speed=10){
    el.innerHTML = "";
    const cursor = document.createElement("span");
    cursor.className = "cursor";
    cursor.textContent = "▍";
    el.appendChild(cursor);

    let acc = "";
    let lastSaveAt = 0;

    for(let i=0; i<text.length; i++){
      const ch = text[i];
      const nextCh = text[i+1];

      cursor.insertAdjacentText("beforebegin", ch);
      acc += ch;
      smartScrollToBottom();

      // save partial every ~80ms (cheap + smooth)
      const now = performance.now();
      if(now - lastSaveAt > 80){
        setPending(acc);
        lastSaveAt = now;
      }

      if(cancelRequested && isSentenceEnd(ch, nextCh)){
        break;
      }

      await sleep(speed + Math.random()*8);
    }

    cursor.remove();
    setPending(acc);
  }

  /* Send */
  async function send(){
    if(isTypingNow) return;

    const msgRaw = input.value || "";
    const msg = msgRaw.trim();

    // ✅ Word limit: 1000 chars max
    if(msg.length > 1000){
      addBubble("ai", "Word limit is 1000 characters per message. Shorten it a bit 🙂");
      return;
    }

    if(!msg && !attachedImage) return;

    if(msg && isGibberish(msg)){
      addBubble("you", msg);
      addBubble("ai", "Sorry — I didn’t understand that. Try rewording it? 🙂");
      return;
    }

    const c = getActiveChat();

    if(msg && c.title && c.title.startsWith("New chat")){
      c.title = msg.length > 24 ? msg.slice(0,24) + "…" : msg;
    }

    // show image IN CHAT
    const userImageToShow = attachedImage || null;
    const userTextToShow = msg || "";

    addBubble("you", userTextToShow, { imageUrl: userImageToShow });
    c.messages.push({
      role: "user",
      content: userTextToShow,
      imageUrl: userImageToShow || undefined
    });

    // clear input immediately + clear draft
    input.value = "";
    autoResize();
    clearDraft();

    // hide preview as soon as AI starts typing
    hidePreviewUI();

    if(msg && isInsultOrThreat(msg)){
      const reply = "Why Julian";
      addBubble("ai", reply);
      c.messages.push({ role:"assistant", content: reply });
      persistAll();
      renderChatList();

      attachedImage = null;
      attachedFileName = "";
      imagePick.value = "";
      clearPending();
      return;
    }

    setTypingLock(true);
    pinnedToBottom = isNearBottom(chatEl);

    const waitingBubble = addBubble("ai", "", { isTyping:true });

    try{
      const apiMessages = c.messages
        .filter(m => m.role === "system" || m.role === "user" || m.role === "assistant")
        .map(m => ({ role: m.role, content: m.content || "" }));

      const res = await fetch(WORKER_URL, {
        method:"POST",
        headers:{ "Content-Type":"application/json" },
        body: JSON.stringify({
          messages: apiMessages,
          imageUrl: attachedImage || null
        })
      });

      const data = await res.json();
      const reply = data.reply || "(no reply)";

      waitingBubble.innerHTML = "";
      setPending(""); // start pending capture
      await typewriter(waitingBubble, reply, 10);

      const finalText = waitingBubble.textContent || reply;
      c.messages.push({ role:"assistant", content: finalText });
      persistAll();
      renderChatList();
      clearPending();
    }catch(e){
      waitingBubble.textContent = "Server error.";
      clearPending();
    }finally{
      setTypingLock(false);

      // reset attachment AFTER request
      attachedImage = null;
      attachedFileName = "";
      imagePick.value = "";
      hidePreviewUI();
    }
  }

  /* Button click: Send OR Stop */
  sendBtn.onclick = ()=>{
    if(isTypingNow) requestCancelTyping();
    else send();
  };

  input.addEventListener("keydown", e=>{
    if(isTypingNow) return;
    if(e.key==="Enter" && !e.shiftKey){
      e.preventDefault();
      send();
    }
  });

  /* Boot */
  renderChatList();
  renderChatMessages();

  // Restore draft (prompt + pasted/attached image) after refresh
  (function restoreDraftOnLoad(){
    const d = loadDraft();
    if(!d) return;
    input.value = d.text || "";
    autoResize();

    if(d.image){
      attachedImage = d.image;
      attachedFileName = d.imageName || "image";
      showPreviewUI(attachedImage, attachedFileName);
    }
  })();

  // Restore partial AI text if refresh happened mid-typewriter
  (function restorePendingOnLoad(){
    const p = loadPending();
    if(!p || !p.partial) return;
    addBubble("ai", p.partial + "\n\n⚠️ (Response was interrupted by refresh)");
  })();
</script>

<script>
  // LOGIN (GitHub Pages)
  const supabaseAuth = window.supabase.createClient(
    "https://zfwjtvnxkylginwlxgto.supabase.co",
    "sb_publishable_bbH0izuoD2ymFae_juiIag_UUI-G4Lc"
  );

  // 👑 Creator settings
  const CREATOR_EMAIL = "etoo50155@gmail.com";
  const creatorBadge = document.getElementById("creatorBadge");

  function isCreator(user){
    const email = (user?.email || "").toLowerCase();
    return email === CREATOR_EMAIL.toLowerCase();
  }

  function githubPagesRedirect(){
    return "https://spenceai.github.io/SpenceAI/";
  }

  async function loginWithGoogle(){
    const { error } = await supabaseAuth.auth.signInWithOAuth({
      provider: "google",
      options: { redirectTo: githubPagesRedirect() }
    });
    if(error){
      console.error("Login error:", error);
      alert("Login failed. Check Supabase Redirect URLs.");
    }
  }

  async function logout(){
    await supabaseAuth.auth.signOut();
  }

  async function refreshAuthUI(session){
    const loggedIn = !!session;

    document.body.classList.toggle("logged-in", loggedIn);
    document.body.classList.toggle("logged-out", !loggedIn);

    if(loggedIn){
      authPill.textContent = session.user?.email || "Logged in";
      authBtn.textContent = "Log out";
      if(brandSub) brandSub.textContent = "Saved chats";
    } else {
      authPill.textContent = "Logged out";
      authBtn.textContent = "Log in";
      if(brandSub) brandSub.textContent = "Log in to view chats";
    }
  }

  // Say hello only once per browser session (not every refresh)
  const HELLO_KEY = "spenceai_creator_hello_v1";

  function maybeCreatorHello(user){
    const isC = !!user && isCreator(user);
    if(creatorBadge) creatorBadge.style.display = isC ? "inline-flex" : "none";

    if(!isC) return;

    try{
      if(localStorage.getItem(HELLO_KEY) === "1") return;
      localStorage.setItem(HELLO_KEY, "1");
    }catch{}

    // add hello bubble (uses addBubble + chat storage from script #1)
    try{
      addBubble("ai", "Hello Mr. Doakes.");
      const c = getActiveChat();
      c.messages.push({ role:"assistant", content:"Hello Mr. Doakes." });
      persistAll();
      renderChatList();
    }catch(e){
      console.warn("Creator hello failed:", e);
    }
  }

  // Button handler
  authBtn.addEventListener("click", async ()=>{
    const { data } = await supabaseAuth.auth.getSession();
    if(data?.session) logout();
    else loginWithGoogle();
  });

  // Live updates
  supabaseAuth.auth.onAuthStateChange(async (_event, session) => {
    await refreshAuthUI(session);
    maybeCreatorHello(session?.user);
  });

  // Initial load
  (async function initAuth(){
    const { data, error } = await supabaseAuth.auth.getSession();
    if(error) console.error("getSession error:", error);
    await refreshAuthUI(data?.session);
    maybeCreatorHello(data?.session?.user);
  })();
</script>
