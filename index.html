<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>SpenceAI</title>

<style>
:root{
  --bg:#0b0f16;
  --panel:#141d2e;
  --border:#1f2a3a;
  --text:#e8eefc;
  --muted:#a7b2c8;
  --you1:#2b6cff;
  --you2:#6b4bff;
}

*{box-sizing:border-box;}
html,body{height:100%;}

body{
  margin:0;
  font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial;
  background:
    radial-gradient(1200px 700px at 25% -10%, rgba(43,108,255,.20), transparent 60%),
    radial-gradient(900px 600px at 85% 0%, rgba(150,80,255,.16), transparent 60%),
    var(--bg);
  color:var(--text);
  display:flex;
  flex-direction:column;
}

/* Top bar */
.topbar{
  padding:16px 24px;
  border-bottom:1px solid rgba(255,255,255,.06);
  backdrop-filter:blur(8px);
  background:rgba(11,15,22,.6);
}

.title{
  font-weight:700;
  font-size:18px;
}

.subtitle{
  font-size:12px;
  color:var(--muted);
}

/* Chat area */
.chat{
  flex:1;
  overflow-y:auto;
  padding:30px 20px 120px;
  max-width:900px;
  width:100%;
  margin:0 auto;
}

.row{
  display:flex;
  margin:14px 0;
}

.row.you{justify-content:flex-end;}
.row.ai{justify-content:flex-start;}

.bubble{
  padding:14px 16px;
  border-radius:18px;
  max-width:80%;
  line-height:1.45;
  white-space:pre-wrap;
  word-wrap:break-word;
}

.bubble.you{
  background:linear-gradient(135deg,var(--you1),var(--you2));
  color:white;
  border-bottom-right-radius:8px;
}

.bubble.ai{
  background:var(--panel);
  border:1px solid rgba(255,255,255,.08);
  border-bottom-left-radius:8px;
}

/* Composer */
.composer{
  position:fixed;
  bottom:0;
  left:0;
  right:0;
  padding:18px;
  border-top:1px solid rgba(255,255,255,.06);
  background:rgba(11,15,22,.7);
  backdrop-filter:blur(10px);
}

.composer-inner{
  max-width:900px;
  margin:0 auto;
  display:flex;
  gap:10px;
}

textarea{
  flex:1;
  resize:none;
  border:none;
  outline:none;
  border-radius:18px;
  padding:12px 14px;
  background:#1a2333;
  color:white;
  min-height:40px;
  max-height:180px;
  overflow:auto;
}

button{
  background:linear-gradient(135deg,var(--you1),var(--you2));
  border:none;
  border-radius:16px;
  padding:0 20px;
  color:white;
  font-weight:600;
  cursor:pointer;
}
</style>
</head>
<body>

<div class="topbar">
  <div class="title">SpenceAI</div>
  <div class="subtitle">Dark mode • Memory in-session</div>
</div>

<div class="chat" id="chat"></div>

<div class="composer">
  <div class="composer-inner">
    <textarea id="input" placeholder="Message SpenceAI…"></textarea>
    <button id="sendBtn">Send</button>
  </div>
</div>

<script>
const WORKER_URL = "https://spenceai-api.etoo50155.workers.dev";

const chat = document.getElementById("chat");
const input = document.getElementById("input");
const sendBtn = document.getElementById("sendBtn");

let conversation = [
  {
    role:"system",
    content:"You are SpenceAI created by Dr Doakes. Be modern, clear, and confident."
  }
];

function addBubble(role,text){
  const row=document.createElement("div");
  row.className="row "+role;

  const bubble=document.createElement("div");
  bubble.className="bubble "+role;
  bubble.textContent=text;

  row.appendChild(bubble);
  chat.appendChild(row);
  chat.scrollTop=chat.scrollHeight;
}

function autoResize(){
  input.style.height="auto";
  input.style.height=input.scrollHeight+"px";
}
input.addEventListener("input",autoResize);

async function send(){
  const msg=input.value.trim();
  if(!msg) return;

  addBubble("you",msg);
  conversation.push({role:"user",content:msg});
  input.value="";
  autoResize();

  const thinking=document.createElement("div");
  thinking.className="row ai";
  thinking.innerHTML='<div class="bubble ai">...</div>';
  chat.appendChild(thinking);

  try{
    const res=await fetch(WORKER_URL,{
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify({messages:conversation})
    });

    const data=await res.json();
    const reply=data.reply || "(no reply)";
    thinking.querySelector(".bubble").textContent=reply;

    conversation.push({role:"assistant",content:reply});
  }catch{
    thinking.querySelector(".bubble").textContent="Server error.";
  }

  chat.scrollTop=chat.scrollHeight;
}

sendBtn.onclick=send;

input.addEventListener("keydown",e=>{
  if(e.key==="Enter" && !e.shiftKey){
    e.preventDefault();
    send();
  }
});

addBubble("ai","I'm SpenceAI. What are we working on?");
</script>

</body>
</html>
