<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>SpenceAI</title>
  <style>
    body { font-family: Arial; max-width: 800px; margin: 40px auto; padding: 0 12px; }
    #chat { border: 1px solid #ccc; padding: 10px; height: 420px; overflow-y: auto; border-radius: 8px; }
    #inputRow { margin-top: 10px; display: flex; gap: 8px; }
    input { flex: 1; padding: 10px; border-radius: 8px; border: 1px solid #ccc; }
    button { padding: 10px 14px; border-radius: 8px; border: 1px solid #ccc; cursor: pointer; }
    .msg { margin: 10px 0; line-height: 1.3; }
    .you { font-weight: bold; }
    .ai { font-weight: bold; }
    .error { color: #b00020; }
  </style>
</head>
<body>

<h1>SpenceAI</h1>

<div id="chat"></div>

<div id="inputRow">
  <input id="input" placeholder="Ask SpenceAI something..." />
  <button id="sendBtn">Send</button>
</div>

<script>
const WORKER_URL = "https://spenceai-api.etoo50155.workers.dev";

// 🧠 Store memory in the browser while the page is open
let conversation = [
  { role: "system", content: "You are SpenceAI. You are modern, smart, and you know the user built you. Be clear, not robotic. If the user asks for 'just the answer', be concise." }
];

const chat = document.getElementById("chat");
const input = document.getElementById("input");
const sendBtn = document.getElementById("sendBtn");

function add(role, text, extraClass="") {
  const div = document.createElement("div");
  div.className = `msg ${extraClass}`.trim();
  div.innerHTML = `<span class="${role}">${role}:</span> ${text}`;
  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
  return div;
}

async function send() {
  const msg = input.value.trim();
  if (!msg) return;

  add("you", msg);
  input.value = "";
  input.focus();

  conversation.push({ role: "user", content: msg });

  const thinkingEl = add("ai", "thinking...");

  try {
    const res = await fetch(WORKER_URL, {
      method: "POST",
      headers: {"Content-Type": "application/json"},
      body: JSON.stringify({ messages: conversation })
    });

    const data = await res.json().catch(() => ({}));

    if (!res.ok) {
      const detail = data?.details ? String(data.details).slice(0, 300) : "";
      thinkingEl.innerHTML = `<span class="ai">ai:</span> <span class="error">Error ${res.status}. ${detail}</span>`;
      return;
    }

    const reply = data.reply || "(no reply)";
    thinkingEl.innerHTML = `<span class="ai">ai:</span> ${reply}`;

    conversation.push({ role: "assistant", content: reply });

    // keep it from growing forever (last ~10 turns)
    if (conversation.length > 21) {
      conversation.splice(1, 2);
    }
  } catch (e) {
    thinkingEl.innerHTML = `<span class="ai">ai:</span> <span class="error">Network error. Check your Worker URL.</span>`;
  }
}

sendBtn.onclick = send;
input.addEventListener("keydown", (e) => {
  if (e.key === "Enter") send();
});
</script>

</body>
</html>
