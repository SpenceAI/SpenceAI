<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>SpenceAI</title>
  <style>
    body { font-family: Arial; max-width: 800px; margin: 40px auto; padding: 0 12px; }
    #chat { border: 1px solid #ccc; padding: 10px; height: 420px; overflow-y: auto; border-radius: 8px; }
    #inputRow { margin-top: 10px; display: flex; gap: 8px; }
    input { flex: 1; padding: 10px; border-radius: 8px; border: 1px solid #ccc; }
    button { padding: 10px 14px; border-radius: 8px; border: 1px solid #ccc; cursor: pointer; }
    .msg { margin: 10px 0; line-height: 1.4; }
    .you { font-weight: bold; }
    .ai { font-weight: bold; }
    .error { color: #b00020; }
  </style>
</head>
<body>

<h1>SpenceAI</h1>

<div id="chat"></div>

<div id="inputRow">
  <input id="input" placeholder="Ask SpenceAI something..." />
  <button id="sendBtn">Send</button>
</div>

<script>
const WORKER_URL = "https://spenceai-api.etoo50155.workers.dev";

// 🔥 Strong system personality
let conversation = [
  { role: "system", content: `
You are SpenceAI.
You were created by the user.
Your name is SpenceAI.

Never mention Prodigy.ai or any other company.
Never claim to be from another platform.
You are SpenceAI only.

Speak modern, confident, clear, and natural.
Do not sound robotic.
Do not over-apologize.
If the user says “just the answer”, be concise.

If the user reacts with “woah”, “really?”, etc., respond naturally and briefly.

Remember previous messages in this conversation and use them when relevant.
` }
];

const chat = document.getElementById("chat");
const input = document.getElementById("input");
const sendBtn = document.getElementById("sendBtn");

function add(role, text, extraClass = "") {
  const div = document.createElement("div");
  div.className = `msg ${extraClass}`.trim();
  div.innerHTML = `<span class="${role}">${role}:</span> ${text}`;
  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
  return div;
}

async function send() {
  const msg = input.value.trim();
  if (!msg) return;

  add("you", msg);
  input.value = "";
  input.focus();

  conversation.push({ role: "user", content: msg });

  const thinkingEl = add("ai", "thinking...");

  try {
    const res = await fetch(WORKER_URL, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ messages: conversation })
    });

    const data = await res.json().catch(() => ({}));

    if (!res.ok) {
      const detail = data?.details ? String(data.details).slice(0, 300) : "";
      thinkingEl.innerHTML = `<span class="ai">ai:</span> <span class="error">Error ${res.status}. ${detail}</span>`;
      return;
    }

    const reply = data.reply || "(no reply)";
    thinkingEl.innerHTML = `<span class="ai">ai:</span> ${reply}`;

    conversation.push({ role: "assistant", content: reply });

    // 🔥 Increased memory window (about 30 turns)
    if (conversation.length > 61) {
      conversation.splice(1, 2);
    }

  } catch (e) {
    thinkingEl.innerHTML = `<span class="ai">ai:</span> <span class="error">Network error. Check Worker.</span>`;
  }
}

sendBtn.addEventListener("click", send);
input.addEventListener("keydown", (e) => {
  if (e.key === "Enter") send();
});
</script>

</body>
</html>
