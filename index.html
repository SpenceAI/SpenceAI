<script>
const WORKER_URL = "https://spenceai-api.etoo50155.workers.dev/";

// 🧠 Store memory in the browser while the page is open
let conversation = [
  { role: "system", content: "You are SpenceAI. You are modern, smart, and you know the user built you. Be clear and not robotic." }
];

const chat = document.getElementById("chat");
const input = document.getElementById("input");
const sendBtn = document.querySelector("button");

function add(role, text) {
  const div = document.createElement("div");
  div.className = "msg";
  div.innerHTML = `<span class="${role}">${role}:</span> ${text}`;
  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
  return div;
}

async function send() {
  const msg = input.value.trim();
  if (!msg) return;

  add("you", msg);
  input.value = "";

  conversation.push({ role: "user", content: msg });

  const thinking = add("ai", "thinking...");

  const res = await fetch(WORKER_URL, {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({ messages: conversation })
  });

  const data = await res.json();
  const reply = data.reply || "(no reply)";

  thinking.innerHTML = `<span class="ai">ai:</span> ${reply}`;

  conversation.push({ role: "assistant", content: reply });

  // keep it from growing forever (last ~10 turns)
  if (conversation.length > 21) {
    conversation.splice(1, 2);
  }
}

sendBtn.onclick = send;
input.addEventListener("keydown", (e) => {
  if (e.key === "Enter") send();
});
</script>
