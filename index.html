<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>SpenceAI</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<link rel="icon" type="image/png" href="favicon.png">

<style>
body{font-family:Arial;background:#0b0f16;color:white;margin:0}
textarea{width:100%;height:44px;border-radius:12px;border:1px solid #333;background:#141d2e;color:white;padding:10px}
button{cursor:pointer}
.send{height:44px;width:48px;border:none;background:#2b6cff;color:white;border-radius:12px}
.attachBtn{height:44px;width:40px;border-radius:12px;border:1px solid #333;background:#141d2e;color:white}
.inputRow{display:flex;gap:10px;padding:10px}
.creatorBadge{
border:1px solid #333;
background:#141d2e;
border-radius:999px;
padding:8px 10px;
height:44px;
display:inline-flex;
align-items:center;
font-size:12px;
white-space:nowrap
}
</style>
</head>

<body>

<div id="chat" style="padding:20px"></div>

<div class="inputRow">
<button class="attachBtn">📎</button>
<textarea id="input" placeholder="Message SpenceAI…"></textarea>

<span id="creatorBadge" class="creatorBadge" style="display:none;">👑 Creator</span>

<button class="send" id="sendBtn">➤</button>
</div>

<script>
let CREATOR_MODE = false;

function addBubble(role,text){
const div=document.createElement("div");
div.textContent=role+": "+text;
document.getElementById("chat").appendChild(div);
}

async function send(){
const msg=document.getElementById("input").value.trim();
if(!msg) return;

addBubble("you",msg);

if(!CREATOR_MODE && msg.length>500){
addBubble("ai","Sorry — I didn’t understand that.");
return;
}

addBubble("ai","(AI reply placeholder)");
}

document.getElementById("sendBtn").onclick=send;
</script>

<script>
const supabaseAuth = window.supabase.createClient(
"https://zfwjtvnxkylginwlxgto.supabase.co",
"sb_publishable_bbH0izuoD2ymFae_juiIag_UUI-G4Lc"
);

const CREATOR_EMAIL="etoo50155@gmail.com";
let greetedCreator=false;

function isCreator(user){
const email=(user?.email||"").toLowerCase();
return email===CREATOR_EMAIL.toLowerCase();
}

async function creatorCheck(){
const {data:{session}}=await supabaseAuth.auth.getSession();
const user=session?.user;

const badge=document.getElementById("creatorBadge");

if(user && isCreator(user)){
CREATOR_MODE=true;
if(badge) badge.style.display="inline-flex";

if(!greetedCreator){
greetedCreator=true;
addBubble("ai","Hello Mr. Doakes.");
}

}else{
CREATOR_MODE=false;
if(badge) badge.style.display="none";
}
}

supabaseAuth.auth.onAuthStateChange(()=>{
creatorCheck();
});

creatorCheck();
</script>

</body>
</html>
