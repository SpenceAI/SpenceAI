<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>SpenceAI</title>

<style>
body{
  margin:0;
  font-family: Arial;
  background:#0b0f16;
  color:white;
  display:flex;
  flex-direction:column;
  height:100vh;
}

.chat{
  flex:1;
  overflow-y:auto;
  padding:20px;
  max-width:900px;
  margin:auto;
  width:100%;
}

.bubble{
  padding:12px 14px;
  border-radius:16px;
  margin:10px 0;
  max-width:80%;
  white-space:pre-wrap;
}

.you{
  background:linear-gradient(135deg,#2b6cff,#6b4bff);
  margin-left:auto;
}

.ai{
  background:#1a2333;
}

.composer{
  display:flex;
  gap:10px;
  padding:15px;
  border-top:1px solid #222;
  max-width:900px;
  margin:auto;
  width:100%;
}

textarea{
  flex:1;
  resize:none;
  border:none;
  outline:none;
  background:#1a2333;
  color:white;
  border-radius:14px;
  padding:10px;
  min-height:40px;
  max-height:200px;
}

button{
  background:linear-gradient(135deg,#2b6cff,#6b4bff);
  border:none;
  color:white;
  padding:0 20px;
  border-radius:14px;
  cursor:pointer;
}
</style>
</head>
<body>

<div class="chat" id="chat"></div>

<div class="composer">
  <textarea id="input" placeholder="Message SpenceAI..."></textarea>
  <button id="send">Send</button>
</div>

<script>
const WORKER_URL = "https://spenceai-api.etoo50155.workers.dev";

const chat = document.getElementById("chat");
const input = document.getElementById("input");
const sendBtn = document.getElementById("send");

let conversation = [
  {
    role: "system",
    content:
      "You are SpenceAI created by Dr Doakes. You can write essays, stories, explanations, and code. If asked for 500 words, write around 500 words with intro, body, and conclusion."
  }
];

function add(role,text){
  const div = document.createElement("div");
  div.className = "bubble " + role;
  div.textContent = text;
  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
}

function autoResize(){
  input.style.height="auto";
  input.style.height=input.scrollHeight+"px";
}

input.addEventListener("input",autoResize);

async function send(){
  const msg = input.value.trim();
  if(!msg) return;

  add("you",msg);
  conversation.push({role:"user",content:msg});
  input.value="";
  autoResize();

  const thinking = document.createElement("div");
  thinking.className="bubble ai";
  thinking.textContent="...";
  chat.appendChild(thinking);

  try{
    const res = await fetch(WORKER_URL,{
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify({messages:conversation})
    });

    const data = await res.json();
    const reply = data.reply || "(no reply)";

    thinking.textContent = reply;
    conversation.push({role:"assistant",content:reply});
  }catch{
    thinking.textContent="Error contacting server.";
  }

  chat.scrollTop = chat.scrollHeight;
}

sendBtn.onclick = send;

input.addEventListener("keydown",e=>{
  if(e.key==="Enter" && !e.shiftKey){
    e.preventDefault();
    send();
  }
});

add("ai","I'm SpenceAI. What are we working on?");
</script>

</body>
</html>
