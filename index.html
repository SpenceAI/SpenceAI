<!DOCTYPE html>
<html>
<head>
  <title>SpenceAI</title>
  <style>
    body { font-family: Arial; max-width: 800px; margin: 40px auto; }
    #chat { border: 1px solid #ccc; padding: 10px; height: 400px; overflow-y: auto; }
    #inputRow { margin-top: 10px; display: flex; }
    input { flex: 1; padding: 8px; }
    button { padding: 8px; }
    .msg { margin: 8px 0; }
    .you { font-weight: bold; }
    .ai { font-weight: bold; }
  </style>
</head>
<body>

<h1>SpenceAI</h1>

<div id="chat"></div>

<div id="inputRow">
  <input id="input" placeholder="Ask SpenceAI something..." />
  <button onclick="send()">Send</button>
</div>

<script>
const WORKER_URL = "https://spenceai-api.etoo50155.workers.dev";

const chat = document.getElementById("chat");
const input = document.getElementById("input");

function add(role, text) {
  const div = document.createElement("div");
  div.className = "msg";
  div.innerHTML = `<span class="${role}">${role}:</span> ${text}`;
  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
}

async function send() {
  const message = input.value.trim();
  if (!message) return;

  add("you", message);
  input.value = "";

  const thinking = add("ai", "thinking...");

  const res = await fetch(WORKER_URL, {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({ message })
  });

  const data = await res.json();

  chat.lastChild.innerHTML = `<span class="ai">ai:</span> ${data.reply}`;
}

input.addEventListener("keydown", e => {
  if (e.key === "Enter") send();
});
</script>

</body>
</html>
