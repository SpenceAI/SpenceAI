<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>SpenceAI</title>

<link rel="icon" type="image/png" href="favicon.png">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Sora:wght@600;700&display=swap" rel="stylesheet">

<style>
:root{
  --bg:#0b0f16;
  --panel:#141d2e;
  --text:#e8eefc;
  --muted:#a7b2c8;
  --you1:#2b6cff;
  --you2:#6b4bff;
}

*{box-sizing:border-box;}
html,body{height:100%;}

body{
  margin:0;
  font-family:'Inter', ui-sans-serif, system-ui;
  background:
    radial-gradient(1200px 700px at 25% -10%, rgba(43,108,255,.20), transparent 60%),
    radial-gradient(900px 600px at 85% 0%, rgba(150,80,255,.16), transparent 60%),
    var(--bg);
  color:var(--text);
  display:flex;
  flex-direction:column;
}

/* Top bar */
.topbar{
  padding:16px 24px;
  border-bottom:1px solid rgba(255,255,255,.06);
  backdrop-filter:blur(8px);
  background:rgba(11,15,22,.6);
}
.title{
  font-family:'Sora', sans-serif;
  font-weight:700;
  font-size:20px;
  letter-spacing:-0.5px;
}
.subtitle{font-size:12px;color:var(--muted);}

/* Chat */
.chat{
  flex:1;
  overflow-y:auto;
  padding:30px 20px 140px;
  max-width:900px;
  width:100%;
  margin:0 auto;
}
.row{display:flex;margin:14px 0;}
.row.you{justify-content:flex-end;}
.row.ai{justify-content:flex-start;}

.bubble{
  padding:14px 16px;
  border-radius:18px;
  max-width:80%;
  line-height:1.5;
  white-space:pre-wrap;
  word-wrap:break-word;
  font-size:15px;
}
.bubble.you{
  background:linear-gradient(135deg,var(--you1),var(--you2));
  color:white;
  border-bottom-right-radius:8px;
}
.bubble.ai{
  background:var(--panel);
  border:1px solid rgba(255,255,255,.08);
  border-bottom-left-radius:8px;
}

.imgwrap{
  margin-top:10px;
  border-radius:14px;
  overflow:hidden;
  border:1px solid rgba(255,255,255,.12);
}
.imgwrap img{display:block;max-width:100%;height:auto;}

/* Composer */
.composer{
  position:fixed;
  bottom:0;left:0;right:0;
  padding:18px;
  border-top:1px solid rgba(255,255,255,.06);
  background:rgba(11,15,22,.7);
  backdrop-filter:blur(10px);
}
.composer-inner{
  max-width:900px;
  margin:0 auto;
  display:flex;
  gap:10px;
  align-items:flex-end;
}
textarea{
  flex:1;
  resize:none;
  border:none;
  outline:none;
  border-radius:18px;
  padding:12px 14px;
  background:#1a2333;
  color:white;
  min-height:40px;
  max-height:180px;
  overflow:auto;
  font-family:'Inter', sans-serif;
}
button{
  background:linear-gradient(135deg,var(--you1),var(--you2));
  border:none;
  border-radius:16px;
  padding:0 16px;
  height:44px;
  color:white;
  font-weight:600;
  cursor:pointer;
  font-family:'Inter', sans-serif;
  display:flex;
  align-items:center;
  gap:8px;
}
.iconBtn{
  width:44px;
  padding:0;
  justify-content:center;
}
.fileHidden{display:none;}

.attachPreview{
  max-width:900px;
  margin:0 auto 10px;
  padding:0 18px;
  color:var(--muted);
  font-size:12px;
}
.attachPreview strong{color:var(--text);}
</style>
</head>

<body>

<div class="topbar">
  <div class="title">SpenceAI</div>
  <div class="subtitle">Dark mode • Memory in-session</div>
</div>

<div class="chat" id="chat"></div>

<div class="composer">
  <div class="attachPreview" id="attachPreview" style="display:none;"></div>

  <div class="composer-inner">
    <input class="fileHidden" id="fileInput" type="file" accept="image/*" />
    <button class="iconBtn" id="imgBtn" title="Attach image">🖼️</button>

    <textarea id="input" placeholder="Message SpenceAI…"></textarea>
    <button id="sendBtn">Send</button>
  </div>
</div>

<script>
const WORKER_URL = "https://spenceai-api.etoo50155.workers.dev";

const chat = document.getElementById("chat");
const input = document.getElementById("input");
const sendBtn = document.getElementById("sendBtn");
const imgBtn = document.getElementById("imgBtn");
const fileInput = document.getElementById("fileInput");
const attachPreview = document.getElementById("attachPreview");

let pendingImage = null; // { name, type, dataUrl, size }

let conversation = [
  { role:"system", content:"You are SpenceAI created by Dr Doakes. Be modern, clear, confident, friendly, and use emojis when it fits 😊." }
];

function addBubble(role, text, imageDataUrl=null){
  const row = document.createElement("div");
  row.className = "row " + role;

  const bubble = document.createElement("div");
  bubble.className = "bubble " + role;
  bubble.textContent = text;

  if (imageDataUrl){
    const wrap = document.createElement("div");
    wrap.className = "imgwrap";
    const img = document.createElement("img");
    img.src = imageDataUrl;
    img.alt = "uploaded image";
    wrap.appendChild(img);
    bubble.appendChild(wrap);
  }

  row.appendChild(bubble);
  chat.appendChild(row);
  chat.scrollTop = chat.scrollHeight;
}

function autoResize(){
  input.style.height = "auto";
  input.style.height = input.scrollHeight + "px";
}
input.addEventListener("input", autoResize);

imgBtn.addEventListener("click", (e) => {
  e.preventDefault();
  fileInput.click();
});

fileInput.addEventListener("change", async () => {
  const file = fileInput.files?.[0];
  if(!file) return;

  // 2MB limit (keeps Worker + HF happy)
  const maxBytes = 2 * 1024 * 1024;
  if(file.size > maxBytes){
    pendingImage = null;
    attachPreview.style.display = "block";
    attachPreview.innerHTML = "Image too large ❌ Please use an image under <strong>2MB</strong>.";
    fileInput.value = "";
    return;
  }

  const dataUrl = await new Promise((resolve, reject) => {
    const r = new FileReader();
    r.onload = () => resolve(r.result);
    r.onerror = reject;
    r.readAsDataURL(file);
  });

  pendingImage = { name:file.name, type:file.type, dataUrl, size:file.size };

  attachPreview.style.display = "block";
  attachPreview.innerHTML = `Attached: <strong>${pendingImage.name}</strong> 🖼️`;
});

async function send(){
  const msg = input.value.trim();
  if(!msg && !pendingImage) return;

  addBubble("you", msg || "(image)", pendingImage?.dataUrl || null);
  conversation.push({ role:"user", content: msg || "(image)" });

  input.value = "";
  autoResize();

  const payload = { messages: conversation };
  if (pendingImage) payload.image = pendingImage;

  // clear attachment UI
  pendingImage = null;
  fileInput.value = "";
  attachPreview.style.display = "none";
  attachPreview.textContent = "";

  const thinking = document.createElement("div");
  thinking.className = "row ai";
  thinking.innerHTML = '<div class="bubble ai">...</div>';
  chat.appendChild(thinking);

  try{
    const res = await fetch(WORKER_URL, {
      method:"POST",
      headers:{ "Content-Type":"application/json" },
      body: JSON.stringify(payload)
    });

    const data = await res.json();
    const reply = data.reply || "(no reply)";
    thinking.querySelector(".bubble").textContent = reply;

    conversation.push({ role:"assistant", content: reply });
  }catch{
    thinking.querySelector(".bubble").textContent = "Server error.";
  }

  chat.scrollTop = chat.scrollHeight;
}

sendBtn.onclick = send;

input.addEventListener("keydown", e => {
  if(e.key === "Enter" && !e.shiftKey){
    e.preventDefault();
    send();
  }
});

addBubble("ai","I'm SpenceAI. What are we working on?");
</script>

</body>
</html>
