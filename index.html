<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>SpenceAI</title>

<link rel="icon" type="image/png" href="favicon.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Sora:wght@600;700&display=swap" rel="stylesheet">

<style>
:root{
  --bg:#0b0f16;
  --panel:#141d2e;
  --panel2:#101828;
  --border:rgba(255,255,255,.08);
  --text:#e8eefc;
  --muted:#a7b2c8;
  --you1:#2b6cff;
  --you2:#6b4bff;
}

*{box-sizing:border-box;}
html,body{height:100%;}

body{
  margin:0;
  font-family:'Inter', system-ui, -apple-system, Segoe UI, Roboto, Arial;
  background:
    radial-gradient(1200px 700px at 25% -10%, rgba(43,108,255,.20), transparent 60%),
    radial-gradient(900px 600px at 85% 0%, rgba(150,80,255,.16), transparent 60%),
    var(--bg);
  color:var(--text);
  overflow:hidden;
}

/* ---------- Sidebar open/close ---------- */
body.sidebar-open .app{ grid-template-columns: 280px 1fr; }
body.sidebar-closed .app{ grid-template-columns: 0 1fr; }

.app{
  height:100%;
  display:grid;
  grid-template-columns: 280px 1fr;
}

/* ---------- Sidebar ---------- */
.sidebar{
  position:relative;
  border-right:1px solid var(--border);
  background:rgba(11,15,22,.55);
  backdrop-filter:blur(10px);
  padding:16px;
  display:flex;
  flex-direction:column;
  gap:12px;
  overflow:hidden;
  transform: translateX(0);
  transition: transform .22s ease;
}
body.sidebar-closed .sidebar{ transform: translateX(-100%); }

/* Mobile overlay */
.overlay{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.45);
  backdrop-filter: blur(2px);
  opacity:0;
  pointer-events:none;
  transition: opacity .2s ease;
  z-index: 20;
}
body.sidebar-open.mobile .overlay{ opacity:1; pointer-events:auto; }

/* ---------- Brand ---------- */
.brand{
  display:flex;align-items:center;gap:10px;
  padding:10px 12px;
  border:1px solid var(--border);
  border-radius:16px;
  background:rgba(20,29,46,.55);
}
.logoDot{
  width:10px;height:10px;border-radius:50%;
  background:linear-gradient(135deg,var(--you1),var(--you2));
  box-shadow:0 0 18px rgba(107,75,255,.35);
}
.brandTitle{font-family:'Sora', sans-serif;font-weight:700;letter-spacing:-0.4px;}
.brandSub{font-size:12px;color:var(--muted);margin-top:2px;}

/* ---------- Buttons / rows ---------- */
.rowBar{
  display:flex;
  gap:10px;
  align-items:center;
}

.sbtn{
  flex:1;
  border:1px solid var(--border);
  background:rgba(20,29,46,.35);
  color:var(--text);
  border-radius:14px;
  padding:12px 12px;
  cursor:pointer;
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:10px;
}
.sbtn:hover{ background:rgba(20,29,46,.55); }

.badge{
  font-size:11px;color:var(--muted);
  border:1px solid var(--border);
  padding:3px 8px;border-radius:999px;
}

/* 📖 Sidebar toggle button (now visible + placed beside New chat) */
.wedgeBtn{
  width:44px;height:44px;
  border-radius:14px;
  border:1px solid var(--border);
  background:rgba(20,29,46,.35);
  color:var(--text);
  cursor:pointer;
  display:flex;
  align-items:center;
  justify-content:center;
}
.wedgeBtn:hover{ background:rgba(20,29,46,.55); }

.sectionTitle{
  margin-top:6px;
  font-size:12px;
  color:var(--muted);
  letter-spacing:.2px;
}

/* ---------- Chat list ---------- */
.chatList{
  display:flex;
  flex-direction:column;
  gap:6px;
  overflow:auto;
  padding-right:4px;
}

.chatItem{
  width:100%;
  text-align:left;
  border:1px solid transparent;
  background:rgba(16,24,40,.20);
  color:var(--text);
  border-radius:14px;
  padding:10px 10px;
  cursor:pointer;
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:10px;
}
.chatItem:hover{ background:rgba(16,24,40,.40); }
.chatItem.active{
  border:1px solid rgba(107,75,255,.35);
  background:rgba(107,75,255,.16);
}

.chatItemTitle{
  font-size:13px;
  font-weight:600;
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
  max-width:180px;
}

.chatItemMenu{
  display:flex;gap:6px;flex:none;
}
.iconBtn{
  border:1px solid var(--border);
  background:rgba(20,29,46,.35);
  color:var(--text);
  border-radius:12px;
  width:30px;height:30px;
  cursor:pointer;
  display:flex;
  align-items:center;
  justify-content:center;
}
.iconBtn:hover{ background:rgba(20,29,46,.55); }

/* ---------- Main ---------- */
.main{height:100%;display:flex;flex-direction:column;}

.topbar{
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:14px 18px;
  border-bottom:1px solid var(--border);
  backdrop-filter:blur(10px);
  background:rgba(11,15,22,.55);
}

.title{font-family:'Sora', sans-serif;font-weight:700;letter-spacing:-0.4px;font-size:18px;}
.subtitle{font-size:12px;color:var(--muted);}

.toggle{
  display:flex;
  border:1px solid var(--border);
  background:rgba(20,29,46,.35);
  border-radius:999px;
  padding:4px;
}
.toggle button{
  border:none;background:transparent;color:var(--muted);
  padding:8px 10px;border-radius:999px;cursor:pointer;
  font-weight:600;font-size:12px;
}
.toggle button.active{
  color:white;background:linear-gradient(135deg,var(--you1),var(--you2));
}

/* Chat */
.chatWrap{flex:1;overflow:hidden;position:relative;}
.chat{
  height:100%;
  overflow-y:auto;
  padding:22px 18px 140px;
  max-width:980px;
  width:100%;
  margin:0 auto;
}

.row{display:flex;margin:14px 0;}
.row.you{justify-content:flex-end;}
.row.ai{justify-content:flex-start;}

.bubble{
  padding:14px 16px;
  border-radius:18px;
  max-width:78%;
  line-height:1.5;
  white-space:pre-wrap;
  word-wrap:break-word;
  font-size:15px;
  border:1px solid transparent;
}
.bubble.you{
  background:linear-gradient(135deg,var(--you1),var(--you2));
  color:white;
  border-bottom-right-radius:8px;
}
.bubble.ai{
  background:rgba(20,29,46,.65);
  border:1px solid var(--border);
  border-bottom-left-radius:8px;
}

/* Composer */
.composer{
  position:absolute;
  left:0; right:0; bottom:0;
  padding:16px 18px;
  border-top:1px solid var(--border);
  background:rgba(11,15,22,.72);
  backdrop-filter:blur(12px);
}
.composerInner{
  max-width:980px;margin:0 auto;
  display:flex;gap:10px;align-items:flex-end;
}
textarea{
  flex:1;
  resize:none;
  border:1px solid var(--border);
  outline:none;
  border-radius:18px;
  padding:12px 14px;
  background:rgba(26,35,51,.85);
  color:white;
  min-height:44px;
  max-height:180px;
  overflow:auto;
  font-family:'Inter', sans-serif;
}
.send{
  height:44px;
  border:none;border-radius:16px;
  padding:0 18px;
  color:white;font-weight:700;
  cursor:pointer;
  background:linear-gradient(135deg,var(--you1),var(--you2));
}

/* Typing dots */
.dots{display:inline-flex;gap:5px;align-items:center;height:16px;}
.dot{width:6px;height:6px;border-radius:50%;background:rgba(232,238,252,.8);opacity:.35;animation:b 1s infinite ease-in-out;}
.dot:nth-child(2){animation-delay:.15s;}
.dot:nth-child(3){animation-delay:.3s;}
@keyframes b{0%,100%{transform:translateY(0);opacity:.35}50%{transform:translateY(-4px);opacity:1}}

/* ---------- Mobile behaviour ---------- */
@media (max-width: 900px){
  .app{ grid-template-columns: 0 1fr; }
  .sidebar{
    position:fixed;
    left:0; top:0; bottom:0;
    width: 280px;
    z-index: 30;
  }
  body.sidebar-open.mobile .sidebar{ transform: translateX(0); }
  body.sidebar-closed.mobile .sidebar{ transform: translateX(-100%); }
  .bubble{ max-width:86%; }
}
</style>
</head>

<body>
<div class="overlay" id="overlay"></div>

<div class="app">

  <aside class="sidebar" id="sidebar">
    <div class="brand">
      <div class="logoDot"></div>
      <div>
        <div class="brandTitle">SpenceAI</div>
        <div class="brandSub">Saved chats • Local</div>
      </div>
    </div>

    <!-- NEW: New chat + 📖 toggle are together -->
    <div class="rowBar">
      <button class="sbtn" id="newChatBtn">New chat <span class="badge">Ctrl+K</span></button>
      <button class="wedgeBtn" id="wedgeBtn" title="Close storage">📖</button>
    </div>

    <div class="sectionTitle">Your chats</div>
    <div class="chatList" id="chatList"></div>
  </aside>

  <main class="main">
    <header class="topbar">
      <div>
        <div class="title">SpenceAI</div>
        <div class="subtitle">Dark mode • Memory in-session + saved chats</div>
      </div>
      <div class="toggle" title="Tone">
        <button id="modeChill" class="active">Chill 😄</button>
        <button id="modePro">Pro 🧠</button>
      </div>
    </header>

    <section class="chatWrap">
      <div class="chat" id="chat"></div>

      <div class="composer">
        <div class="composerInner">
          <textarea id="input" placeholder="Message SpenceAI…"></textarea>
          <button class="send" id="sendBtn">Send</button>
        </div>
      </div>
    </section>
  </main>

</div>

<script>
const WORKER_URL = "https://spenceai-api.etoo50155.workers.dev";

/* Storage */
const LS_KEY = "spenceai_chats_v1";
const LS_ACTIVE = "spenceai_active_chat_v1";

/* DOM */
const chatEl = document.getElementById("chat");
const input = document.getElementById("input");
const sendBtn = document.getElementById("sendBtn");
const newChatBtn = document.getElementById("newChatBtn");
const chatListEl = document.getElementById("chatList");
const modeChill = document.getElementById("modeChill");
const modePro = document.getElementById("modePro");
const wedgeBtn = document.getElementById("wedgeBtn");
const overlay = document.getElementById("overlay");

/* Sidebar helpers */
function isMobile(){ return window.matchMedia("(max-width: 900px)").matches; }
function setMobileFlag(){ document.body.classList.toggle("mobile", isMobile()); }

function openSidebar(){
  document.body.classList.add("sidebar-open");
  document.body.classList.remove("sidebar-closed");
  wedgeBtn.title = "Close storage";
}

function closeSidebar(){
  document.body.classList.add("sidebar-closed");
  document.body.classList.remove("sidebar-open");
  wedgeBtn.title = "Open storage";
}

function toggleSidebar(){
  const open = document.body.classList.contains("sidebar-open");
  if(open) closeSidebar();
  else openSidebar();
}

wedgeBtn.addEventListener("click", toggleSidebar);
overlay.addEventListener("click", closeSidebar);

function applyDefaultSidebar(){
  setMobileFlag();
  if(isMobile()) closeSidebar();
  else openSidebar();
}

window.addEventListener("resize", ()=>{
  const wasMobile = document.body.classList.contains("mobile");
  setMobileFlag();
  const nowMobile = document.body.classList.contains("mobile");
  if(wasMobile !== nowMobile){
    applyDefaultSidebar();
  }
});

/* Helpers */
const uid = () => (crypto?.randomUUID ? crypto.randomUUID() : String(Date.now()) + Math.random().toString(16).slice(2));
function nowTitle(){ return "New chat • " + new Date().toLocaleString(); }

function loadAllChats(){
  try {
    const raw = localStorage.getItem(LS_KEY);
    return raw ? JSON.parse(raw) : [];
  } catch { return []; }
}
function saveAllChats(chats){ localStorage.setItem(LS_KEY, JSON.stringify(chats)); }
function setActiveChatId(id){ localStorage.setItem(LS_ACTIVE, id); }
function getActiveChatId(){ return localStorage.getItem(LS_ACTIVE); }

/* Tone/system */
let tone = "chill";
function systemText(){
  const base = "You are SpenceAI. You were created by Dr Doakes. Never mention any other company/provider. Be modern, clear, confident, and friendly.";
  return tone === "pro"
    ? base + " Be professional, direct, and structured. Use emojis rarely."
    : base + " Use emojis naturally when it fits 😊✨.";
}

/* Chats */
let chats = loadAllChats();
let activeChatId = getActiveChatId();

if(!chats.length){
  const first = { id: uid(), title: nowTitle(), createdAt: Date.now(), messages:[{role:"system", content: systemText()}] };
  chats.unshift(first);
  saveAllChats(chats);
  activeChatId = first.id;
  setActiveChatId(activeChatId);
}
if(!activeChatId || !chats.find(c=>c.id===activeChatId)){
  activeChatId = chats[0].id;
  setActiveChatId(activeChatId);
}
function getActiveChat(){ return chats.find(c=>c.id===activeChatId); }

function addBubble(role, text, isTyping=false){
  const row = document.createElement("div");
  row.className = "row " + role;

  const bubble = document.createElement("div");
  bubble.className = "bubble " + role;

  if(isTyping){
    bubble.innerHTML = '<span class="dots"><span class="dot"></span><span class="dot"></span><span class="dot"></span></span>';
  } else {
    bubble.textContent = text;
  }

  row.appendChild(bubble);
  chatEl.appendChild(row);
  chatEl.scrollTop = chatEl.scrollHeight;
  return bubble;
}

function renderChatMessages(){
  chatEl.innerHTML = "";
  const c = getActiveChat();
  const msgs = c.messages.filter(m=>m.role!=="system");
  if(!msgs.length){
    addBubble("ai","I'm SpenceAI. What are we working on?");
  } else {
    for(const m of msgs){
      addBubble(m.role === "assistant" ? "ai" : "you", m.content);
    }
  }
}

function renderChatList(){
  chatListEl.innerHTML = "";
  for(const c of chats){
    const item = document.createElement("div");
    item.className = "chatItem" + (c.id === activeChatId ? " active" : "");

    const left = document.createElement("div");
    left.className = "chatItemTitle";
    left.textContent = c.title || "Untitled";

    const menu = document.createElement("div");
    menu.className = "chatItemMenu";

    const rename = document.createElement("button");
    rename.className = "iconBtn";
    rename.title = "Rename";
    rename.textContent = "✏️";

    const del = document.createElement("button");
    del.className = "iconBtn";
    del.title = "Delete";
    del.textContent = "🗑️";

    rename.onclick = (e)=>{
      e.stopPropagation();
      const name = prompt("Rename chat:", c.title || "");
      if(name && name.trim()){
        c.title = name.trim();
        saveAllChats(chats);
        renderChatList();
      }
    };

    del.onclick = (e)=>{
      e.stopPropagation();
      if(!confirm("Delete this chat?")) return;
      chats = chats.filter(x=>x.id!==c.id);
      if(!chats.length){
        const n = { id: uid(), title: nowTitle(), createdAt: Date.now(), messages:[{role:"system", content: systemText()}] };
        chats.unshift(n);
      }
      if(activeChatId === c.id){
        activeChatId = chats[0].id;
        setActiveChatId(activeChatId);
      }
      saveAllChats(chats);
      renderChatList();
      renderChatMessages();
    };

    menu.appendChild(rename);
    menu.appendChild(del);

    item.appendChild(left);
    item.appendChild(menu);

    item.onclick = ()=>{
      activeChatId = c.id;
      setActiveChatId(activeChatId);
      renderChatList();
      renderChatMessages();
      if(isMobile()) closeSidebar();
    };

    chatListEl.appendChild(item);
  }
}

function autoResize(){
  input.style.height = "auto";
  input.style.height = input.scrollHeight + "px";
}
input.addEventListener("input", autoResize);

function persistAll(){ saveAllChats(chats); }

function newChat(){
  const c = { id: uid(), title: nowTitle(), createdAt: Date.now(), messages:[{role:"system", content: systemText()}] };
  chats.unshift(c);
  activeChatId = c.id;
  setActiveChatId(activeChatId);
  persistAll();
  renderChatList();
  renderChatMessages();
  if(isMobile()) closeSidebar();
}
newChatBtn.onclick = newChat;

window.addEventListener("keydown", (e)=>{
  if((e.ctrlKey || e.metaKey) && e.key.toLowerCase() === "k"){
    e.preventDefault();
    newChat();
  }
});

function setTone(next){
  tone = next;
  modeChill.classList.toggle("active", tone === "chill");
  modePro.classList.toggle("active", tone === "pro");

  for(const c of chats){
    if(c.messages?.[0]?.role === "system") c.messages[0].content = systemText();
    else c.messages = [{role:"system", content: systemText()}, ...(c.messages||[])];
  }
  persistAll();
}
modeChill.onclick = ()=>setTone("chill");
modePro.onclick = ()=>setTone("pro");

async function send(){
  const msg = input.value.trim();
  if(!msg) return;

  const c = getActiveChat();
  if(c.title && c.title.startsWith("New chat")){
    c.title = msg.length > 24 ? msg.slice(0,24) + "…" : msg;
  }

  addBubble("you", msg);
  c.messages.push({ role:"user", content: msg });

  input.value = "";
  autoResize();

  const typingBubble = addBubble("ai", "", true);

  try{
    const res = await fetch(WORKER_URL, {
      method:"POST",
      headers:{ "Content-Type":"application/json" },
      body: JSON.stringify({ messages: c.messages })
    });

    const data = await res.json();
    const reply = data.reply || "(no reply)";
    typingBubble.textContent = reply;

    c.messages.push({ role:"assistant", content: reply });
    persistAll();
    renderChatList();
  }catch{
    typingBubble.textContent = "Server error.";
  }

  chatEl.scrollTop = chatEl.scrollHeight;
}

sendBtn.onclick = send;
input.addEventListener("keydown", e=>{
  if(e.key==="Enter" && !e.shiftKey){
    e.preventDefault();
    send();
  }
});

/* Boot */
applyDefaultSidebar();
renderChatList();
renderChatMessages();
setTone("chill");
</script>

</body>
</html>
